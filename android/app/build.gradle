plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if(localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def releaseStoreFilePath = keystoreProperties['storeFile']?.toString()
def releaseStoreFile = releaseStoreFilePath != null && releaseStoreFilePath.trim()
        ? rootProject.file(releaseStoreFilePath)
        : null

def hasReleaseSigning = keystorePropertiesFile.exists() &&
        releaseStoreFile != null &&
        releaseStoreFile.exists() &&
        keystoreProperties['storePassword'] != null &&
        keystoreProperties['storePassword'].toString().trim() &&
        keystoreProperties['keyAlias'] != null &&
        keystoreProperties['keyAlias'].toString().trim() &&
        keystoreProperties['keyPassword'] != null &&
        keystoreProperties['keyPassword'].toString().trim()

if (keystorePropertiesFile.exists() && !hasReleaseSigning) {
    def resolvedPath = releaseStoreFile == null ? "(missing storeFile)" : releaseStoreFile.absolutePath
    throw new GradleException("Invalid key.properties for release signing. Keystore not found or properties missing. Resolved storeFile: ${resolvedPath}")
}

android {
    namespace "com.app.boatappowner"
    compileSdk 36
    ndkVersion "28.2.13676358"

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile releaseStoreFile
                storePassword keystoreProperties['storePassword'].toString().trim()
                keyAlias keystoreProperties['keyAlias'].toString().trim()
                keyPassword keystoreProperties['keyPassword'].toString().trim()
            }
        }
    }

    defaultConfig {
        applicationId "com.app.boatappowner"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    buildTypes {
        release {
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    packagingOptions {
        jniLibs.pickFirsts.add("lib/**/libc++_shared.so")
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.1.0"
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3'
    implementation platform('com.google.firebase:firebase-bom:29.0.3')
    implementation 'com.google.firebase:firebase-analytics'
}

subprojects {
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "17"
        }
    }
}
