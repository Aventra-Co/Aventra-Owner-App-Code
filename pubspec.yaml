name: the_boat_ownerside
description: "A new Flutter project."
publish_to: 'none'
version: 4.0.8+12

environment:
  sdk: '>=3.12.1 <4.0.0'
  
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  carousel_slider: ^5.1.2
  pinput: ^6.0.2
  table_calendar: ^3.2.0
  dotted_line: ^3.3.0
  flutter_rating_bar: ^4.0.1
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  http_parser: ^4.1.2
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  connectivity_plus: ^7.2.0
  provider: ^6.1.5+1
  google_maps_flutter: ^2.17.1
  geocoding: ^4.0.0
  app_links: ^7.2.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  emoji_picker_flutter: ^4.4.0
  firebase_messaging: ^16.4.1
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_database: ^12.4.4
  firebase_crashlytics: ^5.2.4
  sign_in_with_apple: ^8.1.0
  cached_network_image: ^3.4.1
  http: ^1.6.0
  onesignal_flutter: ^5.6.3
  webview_flutter: ^4.13.1
  google_sign_in: ^6.2.1 #
  share_plus: ^12.0.2 #
  geolocator: ^14.0.2 #
  intl: ^0.20.2 #

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
        - asset: assets/fonts/PlusJakartaSans-BoldItalic.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
        - asset: assets/fonts/PlusJakartaSans-ExtraBoldItalic.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraLight.ttf
        - asset: assets/fonts/PlusJakartaSans-ExtraLightItalic.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-Italic.ttf
        - asset: assets/fonts/PlusJakartaSans-Light.ttf
        - asset: assets/fonts/PlusJakartaSans-LightItalic.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
        - asset: assets/fonts/PlusJakartaSans-MediumItalic.ttf
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
        - asset: assets/fonts/PlusJakartaSans-SemiBoldItalic.ttf
          weight: 500
